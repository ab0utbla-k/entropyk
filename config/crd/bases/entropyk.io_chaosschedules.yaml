---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: chaosschedules.entropyk.io
spec:
  group: entropyk.io
  names:
    kind: ChaosSchedule
    listKind: ChaosScheduleList
    plural: chaosschedules
    singular: chaosschedule
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .spec.experimentRef
      name: Experiment
      type: string
    - jsonPath: .spec.schedule
      name: Schedule
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: ChaosSchedule is the Schema for the chaosschedules API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of ChaosSchedule
            properties:
              concurrencyPolicy:
                default: Forbid
                description: concurrencyPolicy controls what happens when a new run
                  is due while one is active.
                enum:
                - Forbid
                - Allow
                - Replace
                type: string
              experimentRef:
                description: experimentRef references the ChaosExperiment to run.
                type: string
              safeguards:
                description: safeguards defines safety checks performed before and
                  during experiments.
                properties:
                  maxUnavailable:
                    description: maxUnavailable is the maximum number of pods that
                      can be unavailable during an experiment.
                    format: int32
                    minimum: 1
                    type: integer
                  minReplicasAvailable:
                    description: minReplicasAvailable is the minimum number of pods
                      that must remain running.
                    format: int32
                    minimum: 1
                    type: integer
                type: object
              schedule:
                description: schedule is a cron expression defining when to run (e.g.,
                  "0 2 * * 1-5").
                type: string
              suspend:
                default: false
                description: suspend stops future runs when true. Active runs are
                  not affected.
                type: boolean
              timezone:
                default: UTC
                description: timezone for the cron schedule (e.g., "UTC", "America/New_York").
                type: string
            required:
            - experimentRef
            - schedule
            type: object
          status:
            description: status defines the observed state of ChaosSchedule
            properties:
              activeExperimentName:
                description: activeExperimentName is the name of the ChaosExperiment
                  CR created for the current run.
                type: string
              activeScenario:
                description: activeScenario is the name of the currently running scenario
                  type.
                type: string
              conditions:
                description: |-
                  conditions represent the current state of the ChaosSchedule resource.
                  Each condition has a unique type and reflects the status of a specific aspect of the resource.

                  Standard condition types include:
                  - "Available": the resource is fully functional
                  - "Progressing": the resource is being created or updated
                  - "Degraded": the resource failed to reach or maintain its desired state

                  The status of each condition is one of True, False, or Unknown.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              currentRun:
                description: currentRun tracks the in-progress experiment run.
                properties:
                  scenariosCompleted:
                    description: scenariosCompleted is how many scenarios have finished
                      in this run.
                    format: int32
                    type: integer
                  scenariosTotal:
                    description: scenariosTotal is the total number of scenarios in
                      this run.
                    format: int32
                    type: integer
                  startedAt:
                    description: startedAt is when the current run began.
                    format: date-time
                    type: string
                type: object
              history:
                description: history tracks aggregate results across all runs.
                properties:
                  haltedRuns:
                    description: haltedRuns is the number of runs stopped by safeguards.
                    format: int32
                    type: integer
                  lastHaltReason:
                    description: lastHaltReason describes why the most recent halt
                      occurred.
                    type: string
                  successfulRuns:
                    description: successfulRuns is the number of runs that completed
                      without issues.
                    format: int32
                    type: integer
                  totalRuns:
                    description: totalRuns is the number of experiment runs triggered.
                    format: int32
                    type: integer
                type: object
              lastScheduleTime:
                description: lastScheduleTime is when the last experiment was triggered.
                format: date-time
                type: string
              phase:
                description: phase is the current lifecycle stage of the schedule.
                enum:
                - Idle
                - Running
                - Paused
                - Halted
                - Completed
                - Failed
                type: string
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
