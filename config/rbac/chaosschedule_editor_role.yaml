# This rule is not used by the project entropyk itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the entropyk.io.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: entropyk
    app.kubernetes.io/managed-by: kustomize
  name: chaosschedule-editor-role
rules:
- apiGroups:
  - entropyk.io
  resources:
  - chaosschedules
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - entropyk.io
  resources:
  - chaosschedules/status
  verbs:
  - get
